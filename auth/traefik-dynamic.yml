http:

  # ── Routers ──────────────────────────────────────────────────────────────────
  #
  # Single router for all aispm.local paths, including /_oauth.
  # The `sso` middleware (forward-auth) inspects every request via
  # X-Forwarded-Uri and short-circuits the OIDC callback itself —
  # it must NOT be bypassed for /_oauth, otherwise forward-auth
  # never sees the path (X-Forwarded-* headers are missing on direct
  # backend routing) and falls into a redirect loop.

  routers:

    # The AISPM admin portal — every path (incl. /_oauth) is protected by SSO
    aispm:
      rule: "Host(`aispm.local`)"
      entryPoints:
        - web
      middlewares:
        - sso
      service: aispm

  # ── Middlewares ───────────────────────────────────────────────────────────────

  middlewares:

    sso:
      forwardAuth:
        address: "http://traefik-forward-auth:4181"
        authResponseHeaders:
          - "X-Forwarded-User"
        trustForwardHeader: true

  # ── Services ──────────────────────────────────────────────────────────────────

  services:

    # The AISPM React UI container
    aispm:
      loadBalancer:
        servers:
          - url: "http://ui:3001"
