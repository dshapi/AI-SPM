version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# agent-orchestrator-service — local development stack
# Includes Kafka + Zookeeper so events are actually published to a broker.
# Run:  docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Zookeeper (required by Kafka) ──────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka broker ───────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── agent-orchestrator-service ─────────────────────────────────────────────
  agent-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8094:8094"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DB_PATH: /app/agent_orchestrator.db
      LOG_LEVEL: DEBUG
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
    volumes:
      # Shares the same dir as the main compose stack's agent-orchestrator
      # service so dev-mode and full-stack mode see identical persisted state.
      - ../../DataVolumes/agent-orchestrator:/data
      - ../../platform_shared:/app/platform_shared
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8094/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

# orchestrator_data is now a bind mount to ../../DataVolumes/agent-orchestrator
# (shared with the main compose stack). See DataVolumes/migrate-volumes.sh.
