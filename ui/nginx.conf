server {
    listen 3001;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver so nginx re-resolves upstream
    # hostnames on every request instead of caching them at startup.
    # This prevents 502s after upstream containers are rebuilt/restarted.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy orchestrator calls (Runtime page — sessions, events, WebSocket)
    # NOTE: proxy_pass with a variable disables automatic URI prefix stripping,
    # so we use an explicit rewrite to preserve /api/v1/ prefix before forwarding.
    location /api/v1/ {
        set $orchestrator http://agent-orchestrator:8094;
        rewrite ^(.*)$ $1 break;
        proxy_pass         $orchestrator;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        add_header         Access-Control-Allow-Origin *;
    }

    # Proxy API calls to the CPM API service
    # NOTE: proxy_pass with a variable disables automatic URI prefix stripping,
    # so we use an explicit rewrite to strip /api/ before forwarding.
    location /api/ {
        set $api http://api:8080;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         $api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        add_header         Access-Control-Allow-Origin *;
    }

    # SSE streaming — must disable buffering so tokens flow through immediately
    location /api/chat/stream {
        set $api_sse http://api:8080;
        proxy_pass              $api_sse/chat/stream;
        proxy_http_version      1.1;
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        Connection '';
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      300s;
        chunked_transfer_encoding on;
        add_header              Access-Control-Allow-Origin *;
        add_header              X-Accel-Buffering no;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
