# .github/workflows/test.yml
#
# CI Security Gate — GitHub Actions
#
# Triggers
#   • push  → main, dev
#   • pull_request → main  (blocks merge on failure)
#
# What it does
#   1. Spins up PostgreSQL 15 (SPM model-registry schema)
#   2. Installs Python 3.11 + all dependencies
#   3. Waits for PostgreSQL to accept connections
#   4. Runs Alembic migrations against the test database
#   5. Executes the full pytest suite with --maxfail=1
#      Any failure → workflow fails → PR cannot be merged
#
# Kafka is NOT provisioned: every test that touches Kafka
# uses unittest.mock patches (see services/api/tests/conftest.py).

name: Security Test Suite

"on":
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:
  test:
    name: pytest — security gate
    runs-on: ubuntu-latest

    # ── CI-only backing services ────────────────────────────────────────────
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER:     test
          POSTGRES_PASSWORD: test
          POSTGRES_DB:       test_db
        ports:
          - 5432:5432
        # GitHub waits for healthy before running any step
        options: >-
          --health-cmd "pg_isready -U test -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    # ── Environment variables available to every step ───────────────────────
    env:
      # Database — consumed by Alembic (SPM migrations) and ORM layer
      DATABASE_URL: "postgresql://test:test@localhost:5432/test_db"
      SPM_DB_URL:   "postgresql://test:test@localhost:5432/test_db"

      # PYTHONPATH is intentionally NOT set at the job level.
      # Each test step sets its own scoped PYTHONPATH so that only one
      # service root is visible per pytest process, preventing the
      # tests.conftest module-name collision in pluggy's plugin registry.

      # External services are mocked in unit tests; these stubs satisfy
      # module-level os.getenv() calls during import without live connections.
      # Guard must be enabled so that patch("app._call_guard_model") mocks
      # in test_chat_blocking.py are actually exercised.  No real HTTP call
      # is made — the adapter calls the patched function via late binding.
      GUARD_MODEL_ENABLED:     "true"
      GUARD_MODEL_URL:         "http://guard-model:8200"
      KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"
      REDIS_HOST:              "localhost"
      JWT_PUBLIC_KEY_PATH:     "/dev/null"
      JWT_PRIVATE_KEY_PATH:    "/dev/null"
      OPA_URL:                 "http://localhost:8181"
      ANTHROPIC_API_KEY:       ""

    steps:
      # ── 1. Source ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5

      # ── 2. Python runtime ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/api/requirements.txt

      # ── 3. Dependencies ───────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip

          # Core service stack: fastapi, pytest, pytest-asyncio, httpx,
          # kafka-python-ng, redis, PyJWT[crypto], cryptography, pydantic
          pip install -r services/api/requirements.txt
          pip install kubernetes
          # SPM model-registry ORM and migration tooling
          pip install \
            "sqlalchemy[asyncio]>=2.0" \
            "alembic>=1.13" \
            psycopg2-binary \
            asyncpg

          # Agent-orchestrator in-memory SQLite tests
          pip install aiosqlite

          # Agent-orchestrator service dependencies not in api/requirements.txt
          pip install \
            pydantic-settings \
            "python-jose[cryptography]"

          # spm_api routes (e.g. POST /models/upload) use Form/File data and
          # therefore require python-multipart at IMPORT time. Tests in
          # tests/test_integrations_routes.py lazy-import services.spm_api.app
          # via verify_jwt(), which triggers FastAPI's route inspection of
          # every spm_api route — including the multipart one — so this dep
          # must be installed in the platform-tests venv as well.
          pip install python-multipart==0.0.17

          # Same import-time chain as above: services/spm_api/app.py:834 does
          # `from prometheus_fastapi_instrumentator import Instrumentator` at
          # module top-level. Any test that lazy-imports services.spm_api.app
          # (via verify_jwt() in integrations_routes.py) will fail at import
          # without this. The dep lives in services/spm_api/requirements.txt
          # but CI only installs services/api/requirements.txt, so we mirror
          # it here. Pin matches services/spm_api/requirements.txt.
          pip install prometheus-fastapi-instrumentator==7.0.0

          # tests/test_agent_controller.py imports `kubernetes.client.exceptions`
          # to mock the K8s API. The agent_controller module itself imports
          # `kubernetes` lazily inside functions, but the tests need it at
          # import time. Pin matches services/spm_api/requirements.txt.
          pip install "kubernetes==31.*"

      # ── 4. Readiness gate — deterministic, no race conditions ─────────────
      - name: Wait for PostgreSQL
        run: |
          echo "Waiting for PostgreSQL to accept connections..."
          until pg_isready -h localhost -p 5432 -U test; do
            sleep 2
          done
          echo "PostgreSQL is ready."

      # ── 5. Schema migration ───────────────────────────────────────────────
      #
      # Migration 001 creates the base schema (CREATE … IF NOT EXISTS, so it
      # is safe on databases already bootstrapped with 001_initial.sql).
      # Migration 002+ applies delta changes on top.
      - name: Run database migrations (alembic upgrade head)
        working-directory: spm
        run: alembic upgrade head
        env:
          # Alembic env.py strips +asyncpg and uses psycopg2 for migrations
          SPM_DB_URL: "postgresql://test:test@localhost:5432/test_db"

      # ── 6. Security gate — three scoped pytest invocations ────────────────
      #
      # Each invocation runs in its own process with a scoped PYTHONPATH so
      # only ONE service root is on sys.path at a time.  This prevents the
      # pluggy "tests.conftest already registered" collision that occurs when
      # two service roots are visible simultaneously.
      #
      # Step-level env.PYTHONPATH overrides the (absent) job-level value.
      # All other job-level env vars (DB, stubs, etc.) are inherited.
      #
      # --maxfail=1 means the first failing test stops that invocation;
      # GitHub Actions skips later steps on non-zero exit, so a failure
      # in any suite blocks the PR.

      - name: "Test suite 1/3 — platform (tests/)"
        run: pytest tests/ -v --maxfail=1 --disable-warnings
        env:
          # repo root      → platform_shared/, spm/, tests/
          # services/api/  → security/, models/, (needed by tests that import services.api.app)
          PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/services/api"

      - name: "Test suite 2/3 — API service (services/api/tests/)"
        run: pytest services/api/tests/ -v --maxfail=1 --disable-warnings
        env:
          # repo root  → platform_shared/, spm/, services/guard_model/
          # services/api/ → app.py, security/, models/, promptguard/
          PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/services/api"

      - name: "Test suite 3/3 — agent-orchestrator (services/agent-orchestrator-service/tests/)"
        run: pytest services/agent-orchestrator-service/tests/ -v --maxfail=1 --disable-warnings
        env:
          # repo root              → platform_shared/
          # agent-orchestrator/    → services/, clients/, events/, schemas/
          PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/services/agent-orchestrator-service"
