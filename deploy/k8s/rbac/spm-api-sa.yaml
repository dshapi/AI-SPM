# deploy/k8s/rbac/spm-api-sa.yaml
# ServiceAccount for spm-api — grants it permission to create/delete
# agent Pods and ConfigMaps in the aispm-agents namespace only.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spm-api
  namespace: aispm
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-pod-controller
  namespace: aispm-agents
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spm-api-agent-pod-controller
  namespace: aispm-agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agent-pod-controller
subjects:
  - kind: ServiceAccount
    name: spm-api
    namespace: aispm
