# deploy/helm/aispm/values.yaml
global:
  imageRegistry: ""          # e.g. ghcr.io/your-org
  imagePullPolicy: IfNotPresent
  namespace: aispm

# ── Per-service image tags ───────────────────────────────────────────────────
images:
  api:             { repository: aispm-api,              tag: latest }
  guardModel:      { repository: aispm-guard-model,      tag: latest }
  garakRunner:     { repository: aispm-garak-runner,     tag: latest }
  retrievalGw:     { repository: aispm-retrieval-gw,     tag: latest }
  processor:       { repository: aispm-processor,        tag: latest }
  policyDecider:   { repository: aispm-policy-decider,   tag: latest }
  agent:           { repository: aispm-agent,            tag: latest }
  memoryService:   { repository: aispm-memory,           tag: latest }
  executor:        { repository: aispm-executor,         tag: latest }
  toolParser:      { repository: aispm-tool-parser,      tag: latest }
  outputGuard:     { repository: aispm-output-guard,     tag: latest }
  freezeCtrl:      { repository: aispm-freeze-ctrl,      tag: latest }
  policySimulator: { repository: aispm-policy-sim,       tag: latest }
  spmApi:          { repository: aispm-spm-api,          tag: latest }
  spmMcp:          { repository: aispm-spm-mcp,          tag: latest }
  spmLlmProxy:     { repository: aispm-spm-llm-proxy,    tag: latest }
  spmAggregator:   { repository: aispm-spm-aggregator,   tag: latest }
  agentOrchestrator: { repository: aispm-agent-orchestrator, tag: latest }
  threatHunter:    { repository: aispm-threat-hunter,    tag: latest }
  ui:              { repository: aispm-ui,               tag: latest }
  startupOrch:     { repository: aispm-startup-orch,     tag: latest }
  flinkJob:        { repository: aispm-flink-pyjob,      tag: latest }
  agentRuntime:    { repository: aispm-agent-runtime,    tag: latest }

# ── Infrastructure images (upstream) ────────────────────────────────────────
flink:
  image: flink
  tag: "1.18-scala_2.12"

kafka:
  image: confluentinc/cp-kafka
  tag: "7.6.1"
  replicas: 1
  clusterId: q1Enf0NkTvaBgXGsKZoeRA
  storage: 10Gi
  storageClass: local-path   # dev: local-path; prod: longhorn

redis:
  image: redis
  tag: "7-alpine"
  storage: 1Gi
  storageClass: local-path   # dev: local-path; prod: longhorn
  maxmemory: 512mb

opa:
  image: openpolicyagent/opa
  tag: "0.70.0-static"   # static build avoids automaxprocs SIGSEGV under Lima/k3s

spmDb:
  image: postgres
  tag: "16-alpine"
  storage: 20Gi
  storageClass: local-path   # dev: local-path; prod: longhorn
  database: spm
  user: spm_rw

# ── Platform env (non-secret) ────────────────────────────────────────────────
platformEnv:
  KAFKA_BOOTSTRAP_SERVERS: kafka-broker.aispm.svc.cluster.local:9092
  OPA_URL: http://opa.aispm.svc.cluster.local:8181
  JWT_ALGORITHM: RS256
  JWT_ISSUER: cpm-platform
  GUARD_MODEL_URL: http://guard-model.aispm.svc.cluster.local:8200
  GUARD_MODEL_ENABLED: "true"
  GUARD_MODEL_TIMEOUT: "60.0"
  WS_WAIT_TIMEOUT_S: "10.0"
  RATE_LIMIT_RPM: "60"
  SERVICE_VERSION: "3.0.0"
  ENVIRONMENT: production
  REDIS_HOST: redis.aispm.svc.cluster.local
  REDIS_PORT: "6379"
  AGENT_MCP_URL: http://spm-mcp.aispm.svc.cluster.local:8500/mcp
  AGENT_LLM_BASE_URL: http://spm-llm-proxy.aispm.svc.cluster.local:8500/v1
  AGENT_CONTROLLER_URL: http://spm-api.aispm.svc.cluster.local:8092
  AGENT_POD_NAMESPACE: aispm-agents
  AGENT_RUNTIME_IMAGE: aispm-agent-runtime:latest
  # Threat-hunting-agent LLM backend — points at spm-llm-proxy which fronts Ollama
  GROQ_BASE_URL: "http://spm-llm-proxy.aispm.svc.cluster.local:8500/v1"

# ── Agent runtime ────────────────────────────────────────────────────────────
agentRuntime:
  namespace: aispm-agents
  # RuntimeClass for kernel-boundary isolation. Empty default means
  # "use the cluster's default OCI runtime" — cheap, but agents share
  # the host kernel. Set this to a registered RuntimeClass:
  #   - kata    (RKE2 prod with Kata Containers installed)
  #   - gvisor  (anywhere — Mac/Lima/Linux; user-space sentry instead
  #             of microVM, ~95% Linux ABI, real kernel boundary)
  # Override per-environment:
  #   values.dev.yaml  → "gvisor"
  #   values.prod.yaml → "kata"
  runtimeClassName: ""
  defaultMemMi: 512
  defaultCpuMillicores: 500

  # Aggregate cap on the agent namespace. Hardcoded ceilings prevent
  # a runaway tenant from exhausting the cluster.
  quota:
    enabled: true
    maxPods:                     "100"
    cpuRequests:                 "25"      # 25 vCPU total
    memoryRequests:              "50Gi"
    cpuLimits:                   "50"
    memoryLimits:                "50Gi"
    ephemeralStorageRequests:    "5Gi"
    ephemeralStorageLimits:      "10Gi"
    maxConfigMaps:               "200"     # one per agent + slack

  # Per-container default limits (LimitRange backstop in case
  # spawn_agent_pod ever forgets to set explicit limits).
  # Note: maxCpu/maxMemory must accommodate the istio-proxy sidecar
  # when sidecar injection is active — Istio defaults its sidecar to
  # 2 vCPU / 1 GiB. The agent container itself uses 500m / 512Mi, so
  # 2 / 1Gi is a real ceiling for it but a snug fit for the sidecar.
  limits:
    enabled: true
    defaultCpu:                "500m"
    defaultMemory:             "512Mi"
    defaultEphemeralStorage:   "256Mi"
    defaultRequestCpu:         "100m"
    defaultRequestMemory:      "256Mi"
    maxCpu:                    "2"
    maxMemory:                 "1Gi"

  # mTLS mode for the aispm namespace. PERMISSIVE works with Ambient
  # peers from aispm-agents without waypoints; STRICT requires
  # waypoint proxies for the cross-mode bridge.
  mtlsMode: PERMISSIVE

# ── Kyverno admission policies ─────────────────────────────────────────────
# Cluster-wide policies (disallow-privileged, disallow-host-namespaces,
# image-origin-allowlist) are applied directly via kubectl, not via this
# chart, so they remain active even when the chart is helm-deleted. Only
# the verifyImages policy is templated here because it depends on the
# Cosign keypair which lives alongside the rest of the deployment values.
kyverno:
  verifyImages:
    # Off by default. Local dev images aren't pushed to a registry and
    # have no Cosign signature, so enabling on dev would block every
    # agent pod. Turn on in values.prod.yaml.
    enabled: false
    # "Audit" emits PolicyReport entries without blocking. "Enforce"
    # rejects unsigned images at admission.
    mode: Audit
    # Cosign public key (PEM). Generated with:
    #   cosign generate-key-pair --output-key-prefix deploy/cosign/aispm-images
    # Private key is in deploy/cosign/aispm-images.key (gitignored).
    publicKey: |
      -----BEGIN PUBLIC KEY-----
      MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEC/IrHdw9JZDJvCuC90CXeE7ZEsgE
      SUkFuN8J7uoylaxTLuiZYTf2SuixBO39s1R1a806LzDU5RBJMEORIvl3gA==
      -----END PUBLIC KEY-----

# ── Secrets (safe defaults — override at deploy time via --set or Rancher UI) ─
secrets:
  spmDbPassword: "spmpass"     # matches hardcoded source defaults; override in prod
  groqApiKey: "local"          # placeholder; set to real Groq key in prod
  anthropicApiKey: ""
  tavilyApiKey: ""
  garakInternalSecret: ""
  spmInternalBootstrapSecret: ""
  grafanaAdminPassword: "admin"

# ── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: aispm.example.com
  tlsSecretName: aispm-tls
  letsencryptEmail: ops@example.com
  tls: true             # set false in values.dev.yaml
  certManager: true     # set false in values.dev.yaml
  httpsRedirect: true   # set false in values.dev.yaml

# ── Runtime Security ─────────────────────────────────────────────────────────
# Set falco.enabled=true only when Falco is installed (namespace falco must exist).
# Set tetragon.enabled=true only when Tetragon DaemonSet is healthy.
# Both blocked on Rancher Desktop / Lima VM — require shared /sys/fs/bpf mount.
falco:
  enabled: false   # prod: true (after: helm install falco falcosecurity/falco -n falco)

tetragon:
  enabled: false   # prod: true (after: helm install tetragon cilium/tetragon -n kube-system)

# ── Observability ────────────────────────────────────────────────────────────
prometheus:
  storage: 10Gi
  storageClass: local-path   # dev: local-path; prod: longhorn

grafana:
  adminPasswordSecret: grafana-secret
  storage: 2Gi
  storageClass: local-path   # dev: local-path; prod: longhorn
