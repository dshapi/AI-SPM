# deploy/helm/aispm/templates/flink-pvc.yaml
#
# PVC access-mode notes for 2-JobManager HA:
#
#   flink-checkpoints (ReadWriteMany):
#     Both JM replicas mount this PVC. The active JM writes checkpoint
#     metadata; the standby must be able to read it during recovery.
#     Requires a RWX-capable StorageClass (Longhorn, NFS, CephFS).
#     Dev caveat: local-path does NOT support RWX. In a single-node dev
#     cluster (Rancher Desktop / OrbStack), both JM pods land on the
#     same node so the OS-level RWO constraint is not violated — both
#     pods can mount the same local-path PVC concurrently on one node.
#     Multi-node dev or prod MUST use a RWX-capable StorageClass.
#
#   flink-ha (ReadWriteMany):
#     Holds JobGraph blobs and HA metadata published by the leader.
#     The standby JM reads these blobs to reconstruct job state on
#     failover. Same RWX requirement as flink-checkpoints.
#
#   flink-savepoints + flink-taskmanager-state (ReadWriteOnce):
#     Single-writer semantics: only the active JM triggers savepoints,
#     and each TM replica has its own volume via volumeClaimTemplates.
#     RWO is correct and sufficient here.

# ── Checkpoint storage (shared by both JM replicas) ─────────────────────────
# ReadWriteMany: active JM writes, standby reads on recovery.
# StorageClass must support RWX in multi-node deployments (use longhorn in prod).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flink-checkpoints
  namespace: {{ .Values.global.namespace }}
spec:
  accessModes: [ReadWriteMany]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
# ── Savepoint storage (active JM only) ──────────────────────────────────────
# RWO is sufficient: only the active JM triggers savepoints.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flink-savepoints
  namespace: {{ .Values.global.namespace }}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
# ── TaskManager RocksDB state (single TM writer) ─────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flink-taskmanager-state
  namespace: {{ .Values.global.namespace }}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
# ── JobManager HA blob store (shared by both JM replicas) ────────────────────
# ReadWriteMany: leader publishes JobGraph blobs here; standby reads them
# on failover to reconstruct the active job without client re-submission.
# StorageClass must support RWX in multi-node deployments (use longhorn in prod).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flink-ha
  namespace: {{ .Values.global.namespace }}
spec:
  accessModes: [ReadWriteMany]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
