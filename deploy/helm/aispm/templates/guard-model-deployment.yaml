# deploy/helm/aispm/templates/guard-model-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: guard-model
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: guard-model }
  template:
    metadata:
      labels: { app: guard-model }
    spec:
      containers:
        - name: guard-model
          image: {{ include "aispm.image" .Values.images.guardModel }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8200
          envFrom:
            - configMapRef:
                name: platform-env
            - secretRef:
                name: platform-secrets
          env:
            - name: SPM_DB_URL
              value: "postgresql://{{ .Values.spmDb.user }}:$(SPM_DB_PASSWORD)@spm-db.{{ .Values.global.namespace }}.svc.cluster.local:5432/{{ .Values.spmDb.database }}"
            # GROQ_BASE_URL (Ollama endpoint) is intentionally NOT set here.
            # It is hydrated from the Ollama integration config (int-017.config.base_url)
            # in spm-db by hydrate_env_from_db() at startup.
            # Model (llama-guard3) and prompt mode (llama_guard) are hardcoded in app.py.
          volumeMounts:
            - name: jwt-keys
              mountPath: /keys
              readOnly: true
          readinessProbe:
            httpGet: { path: /health, port: 8200 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8200 }
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: jwt-keys
          secret:
            secretName: jwt-keys
            defaultMode: 0444
