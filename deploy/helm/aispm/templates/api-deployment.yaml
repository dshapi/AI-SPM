# deploy/helm/aispm/templates/api-deployment.yaml
# Single worker required — see Dockerfile NOTE about WebSocket/BackgroundTask state sharing.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      serviceAccountName: spm-api
      containers:
        - name: api
          image: {{ include "aispm.image" .Values.images.api }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: platform-env
            - secretRef:
                name: platform-secrets
          env:
            - name: SPM_DB_URL
              value: "postgresql://{{ .Values.spmDb.user }}:$(SPM_DB_PASSWORD)@spm-db.{{ .Values.global.namespace }}.svc.cluster.local:5432/{{ .Values.spmDb.database }}"
            - name: GARAK_RUNNER_URL
              value: "http://garak-runner.{{ .Values.global.namespace }}.svc.cluster.local:8099"
          volumeMounts:
            - name: jwt-keys
              mountPath: /keys
              readOnly: true
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: jwt-keys
          secret:
            secretName: jwt-keys
            defaultMode: 0444
