# deploy/helm/aispm/templates/spm-llm-proxy-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spm-llm-proxy
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: spm-llm-proxy }
  template:
    metadata:
      labels: { app: spm-llm-proxy }
    spec:
      containers:
        - name: spm-llm-proxy
          image: {{ include "aispm.image" .Values.images.spmLlmProxy }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8500
          envFrom:
            - configMapRef:
                name: platform-env
            - secretRef:
                name: platform-secrets
          env:
            - name: SPM_DB_URL
              value: "postgresql+asyncpg://{{ .Values.spmDb.user }}:$(SPM_DB_PASSWORD)@spm-db.{{ .Values.global.namespace }}.svc.cluster.local:5432/{{ .Values.spmDb.database }}"
          readinessProbe:
            httpGet: { path: /health, port: 8500 }
            initialDelaySeconds: 10
            periodSeconds: 10
