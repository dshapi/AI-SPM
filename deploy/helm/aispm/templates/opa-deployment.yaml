# deploy/helm/aispm/templates/opa-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: opa }
  template:
    metadata:
      labels: { app: opa }
      annotations:
        # Stay out of the Istio mesh.  OPA's startup is fast (~1s) but
        # the static-build image ships busybox-only — no nslookup, no
        # curl — and Istio's pilot-agent probe-rewrite has tripped over
        # the same window before.  More importantly: OPA's only inbound
        # traffic is from the policy_decider service on :8181, both
        # in-cluster, no external auth requirement.  Mesh mTLS adds no
        # security here and adds a moving part (sidecar) that can fail
        # independently.  Callers stay in the mesh and reach OPA's
        # ClusterIP fine without OPA itself being a mesh member.
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: opa
          image: {{ .Values.opa.image }}:{{ .Values.opa.tag }}
          args: ["run", "--server", "--addr=0.0.0.0:8181", "--log-level=info", "--ignore=.*", "/policies"]
          # --ignore=.* skips the hidden ..timestamp dirs Kubernetes creates during
          # atomic ConfigMap updates, which would otherwise cause OPA to load each
          # .rego file twice and trigger "multiple default rules" errors.
          ports:
            - containerPort: 8181
          volumeMounts:
            - name: policies
              mountPath: /policies
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8181
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: policies
          configMap:
            name: opa-policies
