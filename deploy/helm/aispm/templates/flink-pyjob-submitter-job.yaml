# deploy/helm/aispm/templates/flink-pyjob-submitter-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: flink-pyjob-submitter
  namespace: {{ .Values.global.namespace }}
  # NB: previously a `helm.sh/hook` post-install/post-upgrade Job. Hooks
  # were inert under `helm template | kubectl apply` and the bootstrap
  # now sequences this Job in the `compute-init` tier (after flink-jm /
  # flink-tm are Ready). Annotations removed.
spec:
  backoffLimit: 3
  template:
    metadata:
      annotations:
        # Don't inject the istio sidecar into one-shot Jobs — see
        # startup-orchestrator-job.yaml for the init-order rationale.
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: OnFailure
      containers:
        - name: submitter
          image: {{ include "aispm.image" .Values.images.flinkJob }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command: ["/opt/flink-pyjob/submit.sh"]
          env:
            - name: FLINK_JM_URL
              value: "http://flink-jobmanager.{{ .Values.global.namespace }}.svc.cluster.local:8081"
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: platform-env
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: CEP_TENANT_IDS
              value: "t1"
            # Sink topic suffix — audit for live; audit_shadow for shadow runs.
            - name: CEP_AUDIT_TOPIC_SUFFIX
              value: "audit"
            - name: CEP_PARALLELISM
              value: "2"
            # CEP rule thresholds — forwarded to the Flink job via -D java.opts
            # so the running operators see the same values as the TM container.
            - name: CEP_SHORT_WINDOW_SEC
              valueFrom:
                configMapKeyRef:
                  name: platform-env
                  key: CEP_SHORT_WINDOW_SEC
            - name: CEP_LONG_WINDOW_SEC
              valueFrom:
                configMapKeyRef:
                  name: platform-env
                  key: CEP_LONG_WINDOW_SEC
            - name: CEP_SHORT_THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: platform-env
                  key: CEP_SHORT_THRESHOLD
            - name: CEP_LONG_THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: platform-env
                  key: CEP_LONG_THRESHOLD
            - name: CEP_INTENT_DRIFT_THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: platform-env
                  key: CEP_INTENT_DRIFT_THRESHOLD
            - name: CEP_SESSION_HISTORY_SIZE
              valueFrom:
                configMapKeyRef:
                  name: platform-env
                  key: CEP_SESSION_HISTORY_SIZE
