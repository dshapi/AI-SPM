{{- /*
deploy/helm/aispm/templates/istio-authorizationpolicies.yaml

L7 AuthorizationPolicies — complement NetworkPolicy (kernel/CNI layer).

Design rules
────────────
1. Every AP has an explicit ``selector.matchLabels.app: <name>``. NO
   no-selector APs — they apply globally to every Pod in the namespace
   and turn the rest of the chart into a strict allowlist (we lived
   that bug; never again).

2. Every ``rules[].from`` clause has TWO source variants OR'd together:

     - source.principals + source.namespaces → matches sidecar peers
       that carried mTLS identity (sidecar↔sidecar in prod, or ambient
       peers reaching us through a waypoint).
     - source.namespaces only → matches ambient peers reaching the
       destination sidecar without an mTLS principal (gVisor + ztunnel
       on Rancher Desktop / OrbStack dev clusters).

   In either mode, NetworkPolicy at L3/L4 already restricts which Pods
   can even initiate the connection. The principal/namespace check is
   the L7 belt on top of the L3/L4 suspenders.

3. Operation blocks restrict to the minimum necessary path/method/port.

Istio is always installed by the bootstrap script. The previous capability
guard has been removed; if Istio CRDs are ever absent, the apply will fail
loudly, which is what we want.
*/ -}}
{{- $platformNs := .Values.global.namespace }}
{{- $agentNs    := .Values.agentRuntime.namespace }}
{{- $agentSa    := printf "cluster.local/ns/%s/sa/agent-runtime" $agentNs }}
{{- $platformSa := printf "cluster.local/ns/%s/sa/default"        $platformNs }}
{{- $ingressSa  := "cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account" }}
---
# ── aispm-agents: deny-by-default for everything in the agent ns ─────────
# Only the agent-allow-* policies in the aispm namespace ever let agents
# OUT of this namespace. Inside aispm-agents, no pod-to-pod talk is
# permitted; agents are isolated from each other at L7 even before
# NetworkPolicy is consulted.
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: deny-all-agents
  namespace: {{ $agentNs }}
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: aispm
spec: {}   # empty spec = default-deny on every workload in the namespace
---
# ── spm-mcp: agent pods → MCP tool server (port 8500) ────────────────────
# Two ALLOW rules — both gated to port 8500 to keep the surface narrow:
#   1. Agents (aispm-agents namespace) — the production data path: agents
#      call MCP tools to interact with integrations.
#   2. Platform (aispm namespace) — read-only health/probe access used by
#      spm-api's integration test endpoint (POST /integrations/{id}/test
#      hits http://spm-mcp:8500/health to verify reachability). Without
#      this, every integration shows "Failed" in the UI even though the
#      underlying MCP server is healthy — the failure is just the platform
#      sidecar's RBAC denying its own intra-platform call.
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: spm-mcp-allow-agents
  namespace: {{ $platformNs }}
  labels: { app.kubernetes.io/managed-by: Helm, app.kubernetes.io/part-of: aispm }
spec:
  selector:
    matchLabels: { app: spm-mcp }
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: [{{ $agentNs | quote }}]
            principals: [{{ $agentSa | quote }}]
        - source:
            namespaces: [{{ $agentNs | quote }}]
      to:
        - operation:
            ports: ["8500"]
    - from:
        - source:
            namespaces: [{{ $platformNs | quote }}]
      to:
        - operation:
            ports: ["8500"]
---
# ── spm-llm-proxy: agent pods → Ollama / OpenAI / Anthropic proxy ────────
# Two ALLOW rules — both gated to port 8500 to keep the surface narrow:
#   1. Agents (aispm-agents namespace) — production data path: agents
#      proxy LLM calls through here for governance + cost tracking.
#   2. Platform (aispm namespace) — spm-api's `agent_chat` module calls
#      /v1/chat/completions on this proxy for the in-UI custom-agent
#      chat feature. Without this rule the UI's chat returns:
#      "403 Forbidden ... → RBAC: access denied".
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: spm-llm-proxy-allow-agents
  namespace: {{ $platformNs }}
  labels: { app.kubernetes.io/managed-by: Helm, app.kubernetes.io/part-of: aispm }
spec:
  selector:
    matchLabels: { app: spm-llm-proxy }
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: [{{ $agentNs | quote }}]
            principals: [{{ $agentSa | quote }}]
        - source:
            namespaces: [{{ $agentNs | quote }}]
      to:
        - operation:
            ports: ["8500"]
    - from:
        - source:
            namespaces: [{{ $platformNs | quote }}]
      to:
        - operation:
            ports: ["8500"]
    # Sidecar-less / ambient-without-ztunnel callers (agents in dev where
    # the agents namespace is labeled `istio.io/dataplane-mode=ambient`
    # but ztunnel isn't installed). Without a peer identity, the
    # namespace-based rules above can't match, and every chat request
    # from the agent gets "RBAC: access denied" at Envoy. The app's own
    # LLM_API_KEY check is what actually authenticates the caller —
    # Istio here is defense-in-depth, not the trust boundary.
    # Scope kept narrow to the chat surface only.
    - to:
        - operation:
            ports: ["8500"]
            paths:
              - "/v1/chat/completions"
              - "/v1/models"
              - "/v1/embeddings"
              - "/health"
---
# ── spm-api: agent pods (narrow paths) + ingress + intra-platform ────────
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: spm-api-allow
  namespace: {{ $platformNs }}
  labels: { app.kubernetes.io/managed-by: Helm, app.kubernetes.io/part-of: aispm }
spec:
  selector:
    matchLabels: { app: spm-api }
  action: ALLOW
  rules:
    # Agent-runtime path — only ready/bootstrap/secrets endpoints.
    - from:
        - source:
            namespaces: [{{ $agentNs | quote }}]
            principals: [{{ $agentSa | quote }}]
        - source:
            namespaces: [{{ $agentNs | quote }}]
      to:
        - operation:
            paths: ["/agents/*/ready", "/agents/*/bootstrap", "/secrets/*"]
            methods: ["GET", "POST"]
    # Intra-platform — other aispm services (aggregator, agent-orch,
    # threat-hunter) talk to spm-api freely on its ClusterIP service.
    - from:
        - source:
            namespaces: [{{ $platformNs | quote }}]
    # Ingress — admin UI + Swagger + agent UI all hit spm-api via
    # /api/spm/... after the cluster's ingress controller forwards.
    # We accept either istio's own gateway (istio-ingressgateway in
    # istio-system) OR an external ingress controller (ingress-nginx,
    # traefik) which lives in its own namespace.
    - from:
        - source:
            namespaces: ["istio-system"]
            principals: [{{ $ingressSa | quote }}]
        - source:
            namespaces: ["istio-system", "ingress-nginx", "traefik", "kube-system"]
    # PERMISSIVE-mode ingress fallback. ingress-nginx isn't in the
    # mesh and forwards plaintext (no peer cert), so the
    # source.namespaces clause above can't match it. Allow the
    # public API surface on a path-only rule. Keep the surface
    # narrow — internal-only paths are already covered by the
    # intra-platform clause above so they don't need to be here.
    - to:
        - operation:
            paths:
              - "/healthz"
              - "/docs"
              - "/openapi.json"
              # Public API surface served back to the UI. /models* and
              # /posture* were missing from this list, which is why
              # curl through the ingress hit "RBAC: access denied" on
              # /api/spm/models and /api/spm/posture/summary even
              # though those endpoints exist and the data is seeded.
              - "/models*"
              - "/posture*"
              - "/integrations*"
              - "/policies*"
              - "/agents*"
              - "/findings*"
              - "/dashboard*"
              - "/auth*"
              - "/llm*"
---
# ── api: ingress + intra-platform (orchestrator → api full /api/v1/...) ──
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: api-allow
  namespace: {{ $platformNs }}
  labels: { app.kubernetes.io/managed-by: Helm, app.kubernetes.io/part-of: aispm }
spec:
  selector:
    matchLabels: { app: api }
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: [{{ $platformNs | quote }}]
    - from:
        - source:
            namespaces: ["istio-system"]
            principals: [{{ $ingressSa | quote }}]
        - source:
            namespaces: ["istio-system"]
    # PERMISSIVE-mode ingress fallback. ingress-nginx strips the
    # /api prefix via rewrite-target, so the istio-proxy sees the
    # post-rewrite paths (e.g. /v1/chat instead of /api/v1/chat).
    - to:
        - operation:
            paths:
              - "/healthz"
              - "/health"
              - "/docs"
              - "/openapi.json"
              - "/v1*"
              - "/api/v1*"
              - "/chat*"
              - "/agents*"
              - "/sessions*"
              # /simulate/single + /simulate/garak — UI's Simulator
              # tab posts here. Without this, "Simulate" / "Run Garak"
              # in the UI returns "RBAC: access denied" before
              # reaching the api app.
              - "/simulate*"
              - "/dev-token"
              - "/auth*"
              # /ws*  — prefix match covers /ws, /ws/sim/<id>, /ws?token=…
              # The previous "/ws" + "/ws/*" pair missed query-string-only
              # variants and exact /ws when the UI sent it without any
              # trailing segment, returning 403 to the WebSocket upgrade
              # and leaving the Simulator stuck on "Waiting for probe
              # results" while the api side log spams `ws_buffer_full —
              # dropping oldest`. Prefix `/ws*` is the safe fix.
              - "/ws*"
---
# ── ui: ingress only (UI is the public entry point for all browsers) ─────
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: ui-allow-ingress
  namespace: {{ $platformNs }}
  labels: { app.kubernetes.io/managed-by: Helm, app.kubernetes.io/part-of: aispm }
spec:
  selector:
    matchLabels: { app: ui }
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: ["istio-system"]
            principals: [{{ $ingressSa | quote }}]
        - source:
            namespaces: ["istio-system"]
    # PERMISSIVE-mode ingress fallback. UI is public — allow all
    # browser GETs.
    - to:
        - operation:
            methods: ["GET", "HEAD"]
---
# ── kafka: agent pods (chat.in/chat.out) + intra-platform (aggregator,
#    flink, processor produce/consume on the platform topics) ────────────
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: kafka-allow-mesh
  namespace: {{ $platformNs }}
  labels: { app.kubernetes.io/managed-by: Helm, app.kubernetes.io/part-of: aispm }
spec:
  selector:
    matchLabels: { app: kafka }
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: [{{ $platformNs | quote }}]
    - from:
        - source:
            namespaces: [{{ $agentNs | quote }}]
            principals: [{{ $agentSa | quote }}]
        - source:
            namespaces: [{{ $agentNs | quote }}]
      to:
        - operation:
            ports: ["9092"]
---
# ── spm-db: intra-platform only (no external/agent ingress to Postgres) ──
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: spm-db-allow-platform
  namespace: {{ $platformNs }}
  labels: { app.kubernetes.io/managed-by: Helm, app.kubernetes.io/part-of: aispm }
spec:
  selector:
    matchLabels: { app: spm-db }
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: [{{ $platformNs | quote }}]
---
# ── redis: intra-platform only ───────────────────────────────────────────
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: redis-allow-platform
  namespace: {{ $platformNs }}
  labels: { app.kubernetes.io/managed-by: Helm, app.kubernetes.io/part-of: aispm }
spec:
  selector:
    matchLabels: { app: redis }
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: [{{ $platformNs | quote }}]
---
# ── opa: intra-platform only ─────────────────────────────────────────────
# Two ALLOW rules so both sidecared and sidecar-less callers from the
# same namespace can reach OPA:
#   1. mTLS-identified callers from `aispm` (the production case — every
#      sidecared workload has an Istio principal).
#   2. Plain-HTTP callers restricted to OPA's safe read-only surface
#      (/health, /v1/data/...). This covers Jobs that opt out of sidecar
#      injection (startup-orchestrator, db-seed) — those have no Istio
#      peer principal but still need OPA validation. The path filter
#      keeps the data-plane API (PUT /v1/policies, DELETE /v1/data/...)
#      gated behind mTLS even though we relaxed the source check.
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: opa-allow-platform
  namespace: {{ $platformNs }}
  labels: { app.kubernetes.io/managed-by: Helm, app.kubernetes.io/part-of: aispm }
spec:
  selector:
    matchLabels: { app: opa }
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: [{{ $platformNs | quote }}]
    - to:
        - operation:
            methods: ["GET", "POST"]
            paths:
              - "/health"
              - "/v1/data/*"
