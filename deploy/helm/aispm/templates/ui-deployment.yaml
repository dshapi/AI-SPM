# deploy/helm/aispm/templates/ui-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: ui }
  template:
    metadata:
      labels: { app: ui }
    spec:
      containers:
        - name: ui
          image: {{ include "aispm.image" .Values.images.ui }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 3001
          readinessProbe:
            httpGet: { path: /, port: 3001 }
            initialDelaySeconds: 10
            periodSeconds: 10
