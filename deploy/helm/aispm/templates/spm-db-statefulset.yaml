# deploy/helm/aispm/templates/spm-db-statefulset.yaml
{{- /*
Skip rendering when an external Postgres (e.g. CloudNativePG) is running
as the actual primary. Set spmDb.enabled=false in your values overlay,
and provide SPM_DB_URL / SPM_DB_URL_ASYNC via platformEnv that point at
the external Service (e.g. spm-db-rw). The external setup MUST publish
its primary at a Service named whatever the chart's other components
expect (default: `spm-db.<ns>`).
*/ -}}
{{- if .Values.spmDb.enabled | default true }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: spm-db
  namespace: {{ .Values.global.namespace }}
spec:
  serviceName: spm-db
  replicas: 1
  selector:
    matchLabels:
      app: spm-db
  template:
    metadata:
      labels:
        app: spm-db
      annotations:
        # Don't inject the Istio sidecar into Postgres. Same reasoning
        # as kafka and redis: Envoy's L4 interception can break the
        # Postgres wire protocol's startup negotiation, especially the
        # SSLRequest probe pgsql clients send first. Postgres runs
        # in-cluster behind a NetworkPolicy; mTLS is not adding value.
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: postgres
          image: {{ .Values.spmDb.image }}:{{ .Values.spmDb.tag }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.spmDb.database }}
            - name: POSTGRES_USER
              value: {{ .Values.spmDb.user }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: SPM_DB_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d/001_initial.sql
              subPath: 001_initial.sql
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.spmDb.user }}", "-d", "{{ .Values.spmDb.database }}"]
            initialDelaySeconds: 15
            periodSeconds: 10
            # k8s default timeoutSeconds is 1, which is too tight for
            # pg_isready on kind/Docker Desktop — under modest load it
            # routinely takes 2-3s to exec, connect to the postgres
            # socket, send the startup message, and parse the response.
            # Liveness then false-fails, kubelet kills postgres, all
            # connections drop, every dependent service 500s until the
            # pod recovers ~30s later. Same pattern that was already
            # fixed on kafka — see kafka-statefulset.yaml.
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.spmDb.user }}", "-d", "{{ .Values.spmDb.database }}"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: init-sql
          configMap:
            name: spm-db-init-sql
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: {{ .Values.spmDb.storageClass }}
        resources:
          requests:
            storage: {{ .Values.spmDb.storage }}
{{- end }}
