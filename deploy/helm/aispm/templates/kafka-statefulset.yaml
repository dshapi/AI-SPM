# deploy/helm/aispm/templates/kafka-statefulset.yaml
# KRaft combined mode: each pod runs both controller and broker roles.
# Replaces the docker-compose split of kafka-controller + kafka-broker.
#
# HA configuration (replicas: 3):
#   - All three pods participate in the KRaft controller quorum, so the
#     cluster tolerates one node failure without losing leadership.
#   - Replication factor = 3, min.insync.replicas = 2: a write is only
#     acked once 2/3 replicas confirm it — single-broker failure never
#     causes data loss or producer errors.
#
# Dynamic KAFKA_NODE_ID:
#   StatefulSet pod names are kafka-0, kafka-1, kafka-2. We derive the
#   node ID from the pod ordinal at startup via a shell command that strips
#   the prefix from MY_POD_NAME (e.g. "kafka-2" → "2"). This avoids a
#   separate init container and keeps the spec concise.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: {{ .Values.global.namespace }}
spec:
  serviceName: kafka
  replicas: {{ .Values.kafka.replicas }}
  # KRaft requires all controller-quorum members to be running simultaneously
  # to elect a leader. The default OrderedReady policy waits for kafka-0
  # Ready before starting kafka-1, but kafka-0 can't become Ready without
  # kafka-1 / kafka-2 reachable for the controller quorum — classic
  # bootstrap deadlock. Parallel lets all brokers start at once and
  # discover each other.
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
      annotations:
        # Don't inject the Istio sidecar into Kafka brokers. Envoy's L4
        # interception buffers/reframes Kafka's binary protocol on the
        # initial ApiVersionsRequest, which surfaces in clients (kafka-
        # python, librdkafka, sarama) as `UnrecognizedBrokerVersion` or
        # `Connection reset` even though the broker is healthy. Kafka
        # has its own auth/encryption story (SASL/PLAIN, SASL/SCRAM,
        # SSL); we don't gain anything by wrapping it in Istio mTLS.
        sidecar.istio.io/inject: "false"
    spec:
      # ── Spread brokers across nodes ───────────────────────────────────────
      # On a multi-node cluster (k3s with 3 servers) we want each Kafka
      # broker to land on a different node so a node loss only takes one
      # broker down — replication factor 3 keeps topics serving from the
      # remaining two. We use `preferred` (not `required`) so single-node
      # dev clusters (kafka.replicas: 1) still schedule successfully when
      # there's only one node available.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels: { app: kafka }
                topologyKey: kubernetes.io/hostname
      containers:
        - name: kafka
          image: {{ .Values.kafka.image }}:{{ .Values.kafka.tag }}
          # Derive KAFKA_NODE_ID from the pod ordinal before starting Kafka.
          # MY_POD_NAME is e.g. "kafka-2"; ${MY_POD_NAME##*-} strips everything
          # up to and including the last hyphen, leaving just "2".
          command:
            - sh
            - -c
            - |
              export KAFKA_NODE_ID=${MY_POD_NAME##*-}
              exec /etc/confluent/docker/run
          ports:
            - containerPort: 9092   # PLAINTEXT (internal broker)
            - containerPort: 9093   # CONTROLLER
          env:
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # KAFKA_NODE_ID is set dynamically in the command above.
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            # Voters list is dynamic so single-broker dev (kafka.replicas=1)
            # doesn't try to reach kafka-1/kafka-2 and fail Raft elections.
            # Generates "0@kafka-0...:9093,1@kafka-1...:9093,..." for as
            # many brokers as kafka.replicas.
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "{{- range $i, $_ := until (int .Values.kafka.replicas) }}{{ if $i }},{{ end }}{{ $i }}@kafka-{{ $i }}.kafka.{{ $.Values.global.namespace }}.svc.cluster.local:9093{{- end }}"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://$(MY_POD_NAME).kafka.{{ .Values.global.namespace }}.svc.cluster.local:9092"
            # ── Replication & durability ────────────────────────────────────
            # All replication factors are bounded by the broker count: with
            # 1 broker we use RF=1 everywhere; with 3 we get full RF=3 +
            # ISR=2. minInsyncReplicas is values-driven (1 on dev, 2 on prod).
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: {{ .Values.kafka.replicas | quote }}
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: {{ .Values.kafka.replicas | quote }}
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: {{ .Values.kafka.minInsyncReplicas | default 1 | quote }}
            - name: KAFKA_MIN_INSYNC_REPLICAS
              value: {{ .Values.kafka.minInsyncReplicas | default 1 | quote }}
            - name: KAFKA_NUM_PARTITIONS
              value: "3"
            - name: CLUSTER_ID
              value: {{ .Values.kafka.clusterId | quote }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "kafka-broker-api-versions --bootstrap-server localhost:9092"
            initialDelaySeconds: 30
            periodSeconds: 10
            # k8s default timeoutSeconds is 1, which is way too tight
            # for `kafka-broker-api-versions`: it spins up a JVM client,
            # opens a TCP connection, sends a metadata request, and
            # parses the response. Under modest load (e.g. lots of
            # Flink CEP transaction-coordinator inits) the client
            # sometimes takes 2-3s to complete. With timeoutSeconds=1
            # the probe falsely fails, k8s flips the pod to NotReady,
            # the headless DNS entry drops, and any caller doing a
            # fresh hostname lookup (per-request producers in spm-api,
            # tests) gets NXDOMAIN until the probe passes again.
            # 5s gives the broker breathing room without masking real
            # outages — actual broker hangs still trip failureThreshold.
            timeoutSeconds: 5
            failureThreshold: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: {{ .Values.kafka.storageClass }}
        resources:
          requests:
            storage: {{ .Values.kafka.storage }}
