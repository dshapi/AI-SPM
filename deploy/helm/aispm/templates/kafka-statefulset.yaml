# deploy/helm/aispm/templates/kafka-statefulset.yaml
# KRaft combined mode: each pod runs both controller and broker roles.
# Replaces the docker-compose split of kafka-controller + kafka-broker.
#
# HA configuration (replicas: 3):
#   - All three pods participate in the KRaft controller quorum, so the
#     cluster tolerates one node failure without losing leadership.
#   - Replication factor = 3, min.insync.replicas = 2: a write is only
#     acked once 2/3 replicas confirm it — single-broker failure never
#     causes data loss or producer errors.
#
# Dynamic KAFKA_NODE_ID:
#   StatefulSet pod names are kafka-0, kafka-1, kafka-2. We derive the
#   node ID from the pod ordinal at startup via a shell command that strips
#   the prefix from MY_POD_NAME (e.g. "kafka-2" → "2"). This avoids a
#   separate init container and keeps the spec concise.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: {{ .Values.global.namespace }}
spec:
  serviceName: kafka
  replicas: {{ .Values.kafka.replicas }}
  # KRaft requires all controller-quorum members to be running simultaneously
  # to elect a leader. The default OrderedReady policy waits for kafka-0
  # Ready before starting kafka-1, but kafka-0 can't become Ready without
  # kafka-1 / kafka-2 reachable for the controller quorum — classic
  # bootstrap deadlock. Parallel lets all brokers start at once and
  # discover each other.
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
      annotations:
        # Don't inject the Istio sidecar into Kafka brokers. Envoy's L4
        # interception buffers/reframes Kafka's binary protocol on the
        # initial ApiVersionsRequest, which surfaces in clients (kafka-
        # python, librdkafka, sarama) as `UnrecognizedBrokerVersion` or
        # `Connection reset` even though the broker is healthy. Kafka
        # has its own auth/encryption story (SASL/PLAIN, SASL/SCRAM,
        # SSL); we don't gain anything by wrapping it in Istio mTLS.
        sidecar.istio.io/inject: "false"
    spec:
      # ── Spread brokers across nodes ───────────────────────────────────────
      # On a multi-node cluster (k3s with 3 servers) we want each Kafka
      # broker to land on a different node so a node loss only takes one
      # broker down — replication factor 3 keeps topics serving from the
      # remaining two. We use `preferred` (not `required`) so single-node
      # dev clusters (kafka.replicas: 1) still schedule successfully when
      # there's only one node available.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels: { app: kafka }
                topologyKey: kubernetes.io/hostname
      containers:
        - name: kafka
          image: {{ .Values.kafka.image }}:{{ .Values.kafka.tag }}
          # Derive KAFKA_NODE_ID from the pod ordinal before starting Kafka.
          # MY_POD_NAME is e.g. "kafka-2"; ${MY_POD_NAME##*-} strips everything
          # up to and including the last hyphen, leaving just "2".
          command:
            - sh
            - -c
            - |
              export KAFKA_NODE_ID=${MY_POD_NAME##*-}
              exec /etc/confluent/docker/run
          ports:
            - containerPort: 9092   # PLAINTEXT (internal broker)
            - containerPort: 9093   # CONTROLLER
          env:
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # KAFKA_NODE_ID is set dynamically in the command above.
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            # Voters list is dynamic so single-broker dev (kafka.replicas=1)
            # doesn't try to reach kafka-1/kafka-2 and fail Raft elections.
            # Generates "0@kafka-0...:9093,1@kafka-1...:9093,..." for as
            # many brokers as kafka.replicas.
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "{{- range $i, $_ := until (int .Values.kafka.replicas) }}{{ if $i }},{{ end }}{{ $i }}@kafka-{{ $i }}.kafka.{{ $.Values.global.namespace }}.svc.cluster.local:9093{{- end }}"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://$(MY_POD_NAME).kafka.{{ .Values.global.namespace }}.svc.cluster.local:9092"
            # ── Replication & durability ────────────────────────────────────
            # All replication factors are bounded by the broker count: with
            # 1 broker we use RF=1 everywhere; with 3 we get full RF=3 +
            # ISR=2. minInsyncReplicas is values-driven (1 on dev, 2 on prod).
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: {{ .Values.kafka.replicas | quote }}
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: {{ .Values.kafka.replicas | quote }}
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: {{ .Values.kafka.minInsyncReplicas | default 1 | quote }}
            - name: KAFKA_MIN_INSYNC_REPLICAS
              value: {{ .Values.kafka.minInsyncReplicas | default 1 | quote }}
            - name: KAFKA_NUM_PARTITIONS
              value: "3"
            # Default RF for AUTO-created topics. Without this, Kafka uses
            # the upstream default of 1, which silently produces topics
            # that violate KAFKA_MIN_INSYNC_REPLICAS=2 on a 3-broker
            # cluster (every produce then fails NotEnoughReplicasException).
            # Auto-create stays enabled — the platform has implicit
            # producers — but defaults are now correct.
            - name: KAFKA_DEFAULT_REPLICATION_FACTOR
              value: {{ .Values.kafka.replicas | quote }}
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            # ── KRaft / controller timeouts (values-driven) ───────────────
            # The defaults (requestTimeoutMs=2000, quorumElection=1000,
            # quorumFetch=2000) cause leader churn on kind-on-Docker the
            # moment CFS throttling delays the Raft heartbeat thread by
            # more than 2 seconds. Bumping all four to 10s rides through
            # those pauses without masking real broker death — a hung
            # broker still trips failureThreshold within ~30s.
            - name: KAFKA_REQUEST_TIMEOUT_MS
              value: {{ .Values.kafka.controllerTimeouts.request | default 10000 | quote }}
            - name: KAFKA_CONTROLLER_QUORUM_REQUEST_TIMEOUT_MS
              value: {{ .Values.kafka.controllerTimeouts.quorumRequest | default 10000 | quote }}
            - name: KAFKA_CONTROLLER_QUORUM_ELECTION_TIMEOUT_MS
              value: {{ .Values.kafka.controllerTimeouts.quorumElection | default 10000 | quote }}
            - name: KAFKA_CONTROLLER_QUORUM_FETCH_TIMEOUT_MS
              value: {{ .Values.kafka.controllerTimeouts.quorumFetch | default 10000 | quote }}
            - name: CLUSTER_ID
              value: {{ .Values.kafka.clusterId | quote }}
          # ── Resource requests/limits ──────────────────────────────────────
          # Promotes the pod from BestEffort QoS to Burstable so kubelet
          # gives it CFS shares ahead of best-effort pods. Without this,
          # under Flink CEP transaction-init storms the Raft heartbeat
          # thread gets starved → leader churn → readiness probe failures
          # → 26h of 0/1 Ready brokers (incident 2026-05-02).
          {{- with .Values.kafka.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
          # ── Readiness: TCP probe on 9092 ──────────────────────────────────
          # Old probe (`kafka-broker-api-versions --bootstrap-server localhost:9092`)
          # spins up a full JVM client (~3s startup) and walks the metadata
          # protocol. Under metadata churn it consistently exceeds 5s
          # timeoutSeconds and flips pods NotReady — exactly when the
          # cluster needs them MOST visible to drain leader churn. A TCP
          # check on the listener answers the only question that actually
          # matters for reachability ("is the broker accepting
          # connections?"), takes <50ms, and can't be confused by metadata
          # state. A wedged broker that has the socket open but isn't
          # serving requests is still detectable — it'll eventually hit
          # the liveness probe and be restarted.
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          # ── Liveness: same socket, longer leash ───────────────────────────
          # Liveness only restarts the pod, so we want it to fire ONLY when
          # the broker is well and truly hung — not during a 30s leader
          # election. failureThreshold=12 × periodSeconds=15 = 3min before
          # restart, which is comfortably longer than any normal Raft
          # transition.
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: {{ .Values.kafka.storageClass }}
        resources:
          requests:
            storage: {{ .Values.kafka.storage }}
