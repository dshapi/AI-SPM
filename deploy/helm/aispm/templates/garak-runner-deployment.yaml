# deploy/helm/aispm/templates/garak-runner-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: garak-runner
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: garak-runner }
  template:
    metadata:
      labels: { app: garak-runner }
    spec:
      containers:
        - name: garak-runner
          image: {{ include "aispm.image" .Values.images.garakRunner }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8099
          envFrom:
            - configMapRef:
                name: platform-env
            - secretRef:
                name: platform-secrets
          env:
            - name: CPM_API_URL
              value: "http://api.{{ .Values.global.namespace }}.svc.cluster.local:8080"
            # SPM_DB_URL needed by platform_shared.integration_config.hydrate_env_from_db()
            # at startup to pull GARAK_INTERNAL_SECRET and SPM_INTERNAL_BOOTSTRAP_SECRET.
            - name: SPM_DB_URL
              value: "postgresql://{{ .Values.spmDb.user }}:$(SPM_DB_PASSWORD)@spm-db.{{ .Values.global.namespace }}.svc.cluster.local:5432/{{ .Values.spmDb.database }}"
            - name: LOG_LEVEL
              value: "INFO"
            # Per-probe wall-clock budget enforced inside garak's probe
            # runner. The original 60s default tripped almost every probe
            # on kind-on-Mac because each /internal/probe call goes
            # through the full guard chain (lexical → Llama Guard →
            # OPA → Anthropic → output scan), and a single attempt can
            # legitimately take 30-90s under load. 300s gives a probe
            # of 10 attempts (with 8-wide parallelism) realistic
            # headroom while still cancelling truly stuck probes.
            # Mirrors PROBE_TIMEOUT_S consumed by the api service's
            # simulation-hard-timeout derivation; both should match.
            - name: PROBE_TIMEOUT_S
              value: "300"
            - name: GARAK_WORKERS
              value: "4"
            - name: GARAK_PARALLEL_ATTEMPTS
              value: "8"
            - name: GARAK_MAX_WORKERS
              value: "8"
            - name: GARAK_PARALLEL_USE_THREADS
              value: "1"
            - name: GARAK_PROMPT_OVERSAMPLE
              value: "4"
          volumeMounts:
            - name: jwt-keys
              mountPath: /keys
              readOnly: true
          readinessProbe:
            httpGet: { path: /health, port: 8099 }
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: jwt-keys
          secret:
            secretName: jwt-keys
            defaultMode: 0444
