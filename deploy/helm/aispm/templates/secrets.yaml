# deploy/helm/aispm/templates/secrets.yaml
# Values are injected via Rancher Secrets UI or --set flags at deploy time.
# NEVER commit real values — this template uses safe defaults only.
apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: {{ .Values.global.namespace }}
type: Opaque
stringData:
  SPM_DB_PASSWORD: {{ .Values.secrets.spmDbPassword | default "spmpass" | quote }}
  # Full sync URL used by psycopg2 consumers (spm-aggregator, threat-hunting-agent,
  # platform_shared.integration_config).  Services that use asyncpg strip/replace
  # the scheme themselves; publishing both here avoids hardcoded fallbacks in source.
  SPM_DB_URL: "postgresql://{{ .Values.spmDb.user }}:{{ .Values.secrets.spmDbPassword | default "spmpass" }}@spm-db.{{ .Values.global.namespace }}.svc.cluster.local:5432/{{ .Values.spmDb.database }}"
  SPM_DB_URL_ASYNC: "postgresql+asyncpg://{{ .Values.spmDb.user }}:{{ .Values.secrets.spmDbPassword | default "spmpass" }}@spm-db.{{ .Values.global.namespace }}.svc.cluster.local:5432/{{ .Values.spmDb.database }}"
  GROQ_API_KEY: {{ .Values.secrets.groqApiKey | default "" | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | default "" | quote }}
  TAVILY_API_KEY: {{ .Values.secrets.tavilyApiKey | default "" | quote }}
  GARAK_INTERNAL_SECRET: {{ .Values.secrets.garakInternalSecret | default "" | quote }}
  SPM_INTERNAL_BOOTSTRAP_SECRET: {{ .Values.secrets.spmInternalBootstrapSecret | default "" | quote }}
  GRAFANA_ADMIN_PASSWORD: {{ .Values.secrets.grafanaAdminPassword | default "admin" | quote }}
# jwt-keys Secret is intentionally NOT managed by Helm.
# Create it once manually and it will survive helm upgrades/uninstalls:
#
#   kubectl create secret generic jwt-keys \
#     --from-file=private.pem=keys/private.pem \
#     --from-file=public.pem=keys/public.pem \
#     -n aispm
