{{- if .Values.ingress.enabled }}
# deploy/helm/aispm/templates/ui-ingress.yaml
#
# Three Ingress resources because ingress-nginx applies the
# rewrite-target annotation to EVERY path in an Ingress object.
#
#   aispm-orchestrator → /api/v1/*    (regex, no rewrite — orchestrator owns prefix)
#   aispm-api          → /api/spm/* + /api/*  (regex + rewrite)
#   aispm-ui           → /ws + /      (no rewrite, prefix match)
#
# /api/v1 MUST be a separate Ingress so it is NOT subject to the
# rewrite-target: /$2 annotation used by aispm-api. Without this,
# /api/v1/findings gets rewritten to /v1/findings on api:8080 → 404.
#
# use-regex: "true" + ImplementationSpecific pathType is required so that
# nginx sorts /api/v1(/|$)(.*) BEFORE /api(/|$)(.*) by path length.
# A plain Prefix /api/v1 loses to the aispm-api regex location.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aispm-orchestrator
  namespace: {{ .Values.global.namespace }}
  annotations:
    {{- if .Values.ingress.certManager }}
    cert-manager.io/cluster-issuer: letsencrypt-prod
    {{- end }}
    {{- if eq .Values.ingress.className "nginx" }}
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/use-regex: "true"
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api/v1(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: agent-orchestrator
                port:
                  number: 8094
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aispm-api
  namespace: {{ .Values.global.namespace }}
  annotations:
    {{- if .Values.ingress.certManager }}
    cert-manager.io/cluster-issuer: letsencrypt-prod
    {{- end }}
    {{- if eq .Values.ingress.className "nginx" }}
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/use-regex: "true"
    # /api/spm/foo → spm-api:8092/foo
    # /api/foo     → api:8080/foo
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api/spm(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: spm-api
                port:
                  number: 8092
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aispm-ui
  namespace: {{ .Values.global.namespace }}
  annotations:
    {{- if .Values.ingress.certManager }}
    cert-manager.io/cluster-issuer: letsencrypt-prod
    {{- end }}
    {{- if eq .Values.ingress.className "nginx" }}
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ui
                port:
                  number: 3001
{{- end }}
