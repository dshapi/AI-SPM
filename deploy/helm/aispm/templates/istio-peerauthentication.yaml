# deploy/helm/aispm/templates/istio-peerauthentication.yaml
# PERMISSIVE mTLS for the aispm namespace.
#
# Why not STRICT (which the plan originally specified): aispm-agents
# runs Ambient (no sidecar) so its ztunnel reaches sidecar
# destinations in aispm via HBONE. The destination sidecar sees plain
# TCP coming from its local ztunnel listener and STRICT rejects it
# at L4. PERMISSIVE accepts both mTLS and plain at L4, while
# sidecar↔sidecar within aispm continues to use mTLS automatically.
#
# The security envelope is still defended by:
#   - NetworkPolicy default-deny + narrow egress allowlist (L3/L4)
#   - Istio AuthorizationPolicy with the agent-runtime SA principal (L7)
#   - HBONE itself, which carries SPIFFE identity from ztunnel
#
# When Istio CNI + waypoint proxies are installed for the aispm
# services that ambient peers reach, this can return to STRICT.
#
# Istio is always installed by the bootstrap script — the prior capability
# guard is gone (it caused other Istio templates to render-or-not depending
# on which --api-versions flag the caller happened to pass).
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: {{ .Values.global.namespace }}
spec:
  mtls:
    mode: {{ .Values.agentRuntime.mtlsMode | default "PERMISSIVE" }}
