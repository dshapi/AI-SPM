# deploy/helm/aispm/templates/startup-orchestrator-job.yaml
# Runs once after install/upgrade to provision Kafka topics.
# JWT keys are pre-created in the jwt-keys Secret (Task 3) — this Job only
# provisions Kafka topics and any other one-time bootstrap steps.
apiVersion: batch/v1
kind: Job
metadata:
  name: startup-orchestrator
  namespace: {{ .Values.global.namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 3
  # Hard deadline for the entire Job (all attempts combined). If the Job is
  # still running after 10 minutes something is deeply wrong — fail loudly
  # rather than hanging indefinitely and blocking the Helm hook chain.
  activeDeadlineSeconds: 600
  template:
    metadata:
      annotations:
        # Don't inject the istio sidecar into this one-shot Job. The
        # init containers (wait-for-kafka, wait-for-redis) run BEFORE
        # any main container starts; if iptables-validation has
        # already rewritten the network namespace, their nc traffic
        # is redirected to a port that nothing's listening on (the
        # istio-proxy container hasn't started yet) and they hang.
        # Sidecar injection is unnecessary for a topic-creation job
        # that doesn't need mTLS.
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: OnFailure
      # Wait for Kafka and Redis before running — without this the hook may fire
      # while Kafka is still in leader-election and topic creation will fail.
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          # Check TCP connectivity AND that the broker responds to a metadata
          # request (via the kafka-broker API) so we don't proceed while the
          # broker is still in leader-election. Falls back to nc-only if the
          # richer check isn't available in busybox. Hard limit: 240 attempts
          # × 2s = ~8 minutes. If Kafka isn't up by then the init container
          # exits non-zero, the Job fails, and backoffLimit catches it.
          command:
            - sh
            - -c
            - |
              set -eu
              KAFKA_HOST="kafka-broker.{{ .Values.global.namespace }}.svc.cluster.local"
              KAFKA_PORT="9092"
              MAX_ATTEMPTS=240
              attempt=0
              echo "Waiting for Kafka at ${KAFKA_HOST}:${KAFKA_PORT} (max ${MAX_ATTEMPTS} attempts)..."
              until nc -z "${KAFKA_HOST}" "${KAFKA_PORT}" 2>/dev/null; do
                attempt=$(( attempt + 1 ))
                if [ "${attempt}" -ge "${MAX_ATTEMPTS}" ]; then
                  echo "ERROR: Kafka not reachable after ${MAX_ATTEMPTS} attempts (${MAX_ATTEMPTS}x2s). Giving up."
                  exit 1
                fi
                echo "  attempt ${attempt}/${MAX_ATTEMPTS}: Kafka not ready — sleeping 2s..."
                sleep 2
              done
              echo "Kafka TCP port open. Waiting 5s for broker to finish leader election..."
              sleep 5
              echo "Kafka ready."
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
        - name: wait-for-redis
          image: busybox:1.36
          # Hard limit: 120 attempts × 2s = ~4 minutes. Redis should come up
          # much faster than this; the limit is a safety net.
          command:
            - sh
            - -c
            - |
              set -eu
              REDIS_HOST="redis.{{ .Values.global.namespace }}.svc.cluster.local"
              REDIS_PORT="6379"
              MAX_ATTEMPTS=120
              attempt=0
              echo "Waiting for Redis at ${REDIS_HOST}:${REDIS_PORT} (max ${MAX_ATTEMPTS} attempts)..."
              until nc -z "${REDIS_HOST}" "${REDIS_PORT}" 2>/dev/null; do
                attempt=$(( attempt + 1 ))
                if [ "${attempt}" -ge "${MAX_ATTEMPTS}" ]; then
                  echo "ERROR: Redis not reachable after ${MAX_ATTEMPTS} attempts (${MAX_ATTEMPTS}x2s). Giving up."
                  exit 1
                fi
                echo "  attempt ${attempt}/${MAX_ATTEMPTS}: Redis not ready — sleeping 2s..."
                sleep 2
              done
              echo "Redis ready."
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
      containers:
        - name: startup-orchestrator
          image: {{ include "aispm.image" .Values.images.startupOrch }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          envFrom:
            - configMapRef:
                name: platform-env
            - secretRef:
                name: platform-secrets
          env:
            - name: KEYS_DIR
              value: /keys-rw
            - name: JWT_PRIVATE_KEY_PATH
              value: /keys-rw/private.pem
            - name: JWT_PUBLIC_KEY_PATH
              value: /keys-rw/public.pem
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: jwt-keys
              mountPath: /keys-rw
      volumes:
        - name: jwt-keys
          secret:
            secretName: jwt-keys
            defaultMode: 0600
