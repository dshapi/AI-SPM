# deploy/helm/aispm/templates/redis-statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: {{ .Values.global.namespace }}
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
      annotations:
        # Don't inject the Istio sidecar into Redis. Same reasoning as
        # kafka-statefulset.yaml: Envoy's L4 interception breaks Redis's
        # RESP protocol — the server immediately closes the connection
        # when the client sends a non-TLS frame, surfacing in clients
        # as `Connection closed by server.` despite TCP being open.
        # Redis runs in-cluster and is reached only by trusted services;
        # we don't gain anything by also wrapping it in Istio mTLS.
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}:{{ .Values.redis.tag }}
          command:
            - redis-server
            - --save
            - ""
            - --appendonly
            - "yes"
            - --stop-writes-on-bgsave-error
            - "no"
            - --maxmemory
            - {{ .Values.redis.maxmemory }}
            - --maxmemory-policy
            - allkeys-lru
            - --loglevel
            - warning
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: {{ .Values.redis.storageClass }}
        resources:
          requests:
            storage: {{ .Values.redis.storage }}
