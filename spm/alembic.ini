# alembic.ini — AI SPM PostgreSQL migrations
#
# Run from the spm/ directory:
#   alembic upgrade head
#
# Override DB URL at runtime:
#   alembic -x db_url=postgresql://user:pass@host/db upgrade head

[alembic]
script_location = alembic

# Default URL — overridden by SPM_DB_URL env var in env.py (preferred).
# Use a synchronous psycopg2 URL; asyncpg is used by the ORM at runtime.
sqlalchemy.url = postgresql://spm_rw:spmpass@spm-db:5432/spm

# Migration file naming: timestamp + slug
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
